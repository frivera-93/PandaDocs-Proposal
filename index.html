<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <script src="https://cdn.jsdelivr.net/npm/@pipedrive/app-extensions-sdk@0.1/dist/index.umd.js"></script>
</head>
<body>
  <h3>Create Proposal</h3>
  <button id="sendButton">Send Deal to n8n</button>

  <script>
    const sdk = new AppExtensionsSDK();

    sdk.initialize().then(() => {
      return sdk.getContext();
    }).then((context) => {

      const dealId = context?.deal?.id;

      document.getElementById("sendButton").addEventListener("click", async () => {
        try {
          await fetch("https://massiveit.app.n8n.cloud/webhook/proposal_button", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              dealId: dealId
            })
          });

          sdk.execute("showSnackbar", {
            message: "Sent successfully!"
          });

        } catch (err) {
          console.error(err);
        }
      });

    }).catch((err) => {
      console.error("SDK failed to initialize", err);
    });
  </script>
</body>
</html>
