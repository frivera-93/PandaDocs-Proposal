<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <script src="https://cdn.jsdelivr.net/npm/@pipedrive/app-extensions-sdk/dist/index.umd.js"></script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      padding: 10px;
      margin: 0;
    }

    button {
      width: 100%;
      padding: 10px 14px;
      cursor: pointer;
      background-color: #107C10;
      color: white;
      border: none;
      border-radius: 4px;
      font-weight: 600;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background-color 0.2s ease;
    }

    button:hover:not(:disabled) {
      background-color: #0e6f0e;
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-top: 2px solid white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
  <button id="sendButton" type="button" disabled>
    <span id="buttonText">Loading...</span>
  </button>

  <script>
    let dealId = null;
    let sdk = null;

    const button = document.getElementById("sendButton");
    const buttonText = document.getElementById("buttonText");

    function getDealIdFromUrl() {
      const params = new URLSearchParams(window.location.search);

      console.log("✅ Full URL:", window.location.href);
      console.log("✅ Raw query string:", window.location.search);

      const allParams = {};
      for (const [key, value] of params.entries()) {
        allParams[key] = value;
      }
      console.log("✅ URL params:", allParams);

      const possibleDealId =
        params.get("dealId") ||
        params.get("id") ||
        params.get("resourceId") ||
        params.get("selectedIds");

      return possibleDealId;
    }

    async function init() {
      try {
        if (!window.AppExtensionsSDK) {
          throw new Error("AppExtensionsSDK not found");
        }

        sdk = new window.AppExtensionsSDK();
        await sdk.initialize();
        console.log("✅ SDK initialized");

        try {
          await sdk.execute("resize", { height: 200 });
          console.log("✅ Resize worked");
        } catch (resizeError) {
          console.warn("⚠️ Resize failed:", resizeError);
        }

        dealId = getDealIdFromUrl();
        console.log("✅ Resolved dealId:", dealId);

        if (!dealId) {
          buttonText.textContent = "No Deal ID Found";
          button.disabled = true;
          console.error("❌ No deal ID found in URL params");
          return;
        }

        buttonText.textContent = "Create PandaDoc Proposal";
        button.disabled = false;

      } catch (e) {
        console.error("❌ Init failed:", e);
        buttonText.textContent = "Failed to Load";
        button.disabled = true;
      }
    }

    button.addEventListener("click", async (e) => {
      e.preventDefault();

      try {
        if (!dealId) {
          throw new Error("No deal ID found in Pipedrive URL context");
        }

        console.log("🚀 Sending dealId:", dealId);

        button.disabled = true;
        buttonText.textContent = "Creating Proposal...";

        const spinner = document.createElement("div");
        spinner.classList.add("spinner");
        button.appendChild(spinner);

        const response = await fetch(
          "https://massiveit.app.n8n.cloud/webhook/proposal_button",
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ dealId })
          }
        );

        console.log("✅ Response status:", response.status);

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        if (sdk) {
          await sdk.execute("showSnackbar", {
            message: `PandaDoc proposal sent for deal ${dealId}`,
            duration: 3000
          });
        } else {
          alert(`Sent for deal ${dealId} ✅`);
        }

      } catch (error) {
        console.error("❌ Error sending to n8n:", error);

        if (sdk) {
          await sdk.execute("showSnackbar", {
            message: error.message || "Something went wrong",
            duration: 3000
          });
        } else {
          alert(error.message || "Something went wrong");
        }

      } finally {
        button.disabled = !dealId;
        buttonText.textContent = "Create PandaDoc Proposal";

        const spinner = button.querySelector(".spinner");
        if (spinner) spinner.remove();
      }
    });

    init();
  </script>
</body>
</html>
