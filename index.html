<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />

  <!-- ✅ Correct official SDK -->
  <script src="https://cdn.pipedrive.com/pipedrive-app-sdk/v1/pipedrive-app-sdk.js"></script>

  <style>
    body { 
      font-family: Arial, sans-serif; 
      padding: 10px; 
      margin: 0;
    }
    button { 
      padding: 8px 12px; 
      cursor: pointer; 
    }
  </style>
</head>

<body>
  <h3>Create Proposal</h3>
  <button id="sendButton">Send Deal to n8n</button>

  <script>
    let dealId = "test-123";
    let sdk = null;

    async function init() {
      try {
        if (window.AppExtensionsSDK) {
          sdk = new window.AppExtensionsSDK();

          await sdk.initialize();

          console.log("✅ SDK initialized");

          // ✅ REQUIRED: resize or it may stay hidden
          await sdk.execute("resize", { height: 300 });

          const context = await sdk.getContext();
          dealId = context?.selectedIds?.[0];

          console.log("Deal ID:", dealId);
        }
      } catch (e) {
        console.log("Running outside Pipedrive.");
      }
    }

    document.getElementById("sendButton").addEventListener("click", async () => {
      try {
        const response = await fetch(
          "https://massiveit.app.n8n.cloud/webhook/proposal_button",
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ dealId })
          }
        );

        alert("Sent!");

        if (sdk) {
          sdk.execute("showSnackbar", {
            message: "Proposal sent ✅",
            duration: 3000
          });
        }

      } catch (error) {
        console.error(error);
      }
    });

    init();
  </script>
</body>
</html>
