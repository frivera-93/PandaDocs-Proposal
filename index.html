<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />

  <!-- Pipedrive SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@pipedrive/app-extensions-sdk/dist/index.umd.js"></script>

  <style>
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      padding: 12px;
      margin: 0;
      background: #fff;
    }

    .btn {
      width: 100%;
      padding: 10px 14px;
      background-color: #107C10; /* Microsoft Green */
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background-color 0.2s ease;
    }

    .btn:hover:not(:disabled) {
      background-color: #0e6f0e;
    }

    .btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-top: 2px solid white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

  <button id="sendButton" class="btn">
    <span id="buttonText">Create PandaDoc Proposal</span>
  </button>

  <script>
    let dealId = null;
    let sdk = null;

    async function init() {
      try {
        if (window.AppExtensionsSDK) {
          sdk = new window.AppExtensionsSDK();
          await sdk.initialize();
          await sdk.execute("resize", { height: 160 });

          const context = await sdk.getContext();
          dealId = context?.selectedIds?.[0];

          console.log("Deal ID:", dealId);
        }
      } catch (e) {
        console.log("Running outside Pipedrive.");
      }
    }

    const button = document.getElementById("sendButton");
    const buttonText = document.getElementById("buttonText");

    button.addEventListener("click", async () => {
      if (!dealId) return;

      try {
        // ✅ Show loading state
        button.disabled = true;
        buttonText.textContent = "Creating Proposal...";
        
        const spinner = document.createElement("div");
        spinner.classList.add("spinner");
        button.appendChild(spinner);

        await fetch(
          "https://massiveit.app.n8n.cloud/webhook/proposal_button",
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ dealId })
          }
        );

        // ✅ Success feedback
        if (sdk) {
          sdk.execute("showSnackbar", {
            message: "PandaDoc proposal created successfully",
            duration: 3000
          });
        }

      } catch (error) {
        console.error(error);

        if (sdk) {
          sdk.execute("showSnackbar", {
            message: "Something went wrong",
            duration: 3000
          });
        }
      } finally {
        // ✅ Reset button
        button.disabled = false;
        buttonText.textContent = "Create PandaDoc Proposal";
        const spinner = button.querySelector(".spinner");
        if (spinner) spinner.remove();
      }
    });

    init();
  </script>
</body>
</html>
