<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <script src="https://cdn.jsdelivr.net/npm/@pipedrive/app-extensions-sdk@0.1/dist/index.umd.js"></script>
  <style>
    body { font-family: Arial, sans-serif; padding: 10px; }
    button { padding: 8px 12px; cursor: pointer; }
  </style>
</head>
<body>
  <h3>Create Proposal</h3>
  <button id="sendButton">Send Deal to n8n</button>

  <script>
    async function init() {
      let dealId = "test-123"; // fallback for direct testing

      try {
        if (typeof AppExtensionsSDK !== "undefined") {
          const sdk = new AppExtensionsSDK();
          await sdk.initialize();
          const context = await sdk.getContext();
          dealId = context?.selectedIds?.[0];
          console.log("Running inside Pipedrive. Deal ID:", dealId);
        }
      } catch (err) {
        console.log("Not inside Pipedrive. Using fallback.");
      }

      document.getElementById("sendButton").addEventListener("click", async () => {
        try {
          console.log("Sending dealId:", dealId);

          const response = await fetch("https://massiveit.app.n8n.cloud/webhook/proposal_button", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ dealId })
          });

          const text = await response.text();
          console.log("Response:", text);
          alert("Sent!");
        } catch (error) {
          console.error("Fetch failed:", error);
        }
      });
    }

    init();
  </script>
</body>
</html>
